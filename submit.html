<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit a Sighting — PROJECT NAME</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      PROJECT NAME
      <small></small>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="submit.html">Submit Sighting</a></li>
      <li><a href="map.html">Map</a></li>
      <li><a href="birds.html">Meet the Birds</a></li>
      <li><a href="team.html">The Team</a></li>
    </ul>
  </div>
</nav>

<main class="container-narrow">
  <section class="page-header">
    <div class="page-eyebrow">Form · 001</div>
    <h1 class="page-title">Log a sighting.</h1>
    <p class="page-lede">Description.</p>
  </section>

  <form id="sightingForm">
    <div class="form-grid">

      <div class="field full">
        <label>Photo of the bird <span class="hint">(optional)</span></label>
        <label class="file-drop" id="birdPhotoDrop">
          <span id="birdPhotoLabel">Click to upload a photo or screenshot</span>
          <input type="file" accept="image/*" id="birdPhoto" hidden>
        </label>
      </div>

      <div class="field full">
        <label>Species <span class="req">*</span></label>
        <select id="species" required>
          <option value="">— select species —</option>
          <option>Broad-tailed Hummingbird</option>
          <option>Rufous Hummingbird</option>
          <option>Calliope Hummingbird</option>
          <option>Black-chinned Hummingbird</option>
          <option>Unknown hummingbird</option>
          <option>Other (note below)</option>
        </select>
      </div>

      <div class="field">
        <label>Sex</label>
        <div class="radio-row">
          <label><input type="radio" name="sex" value="M"> Male</label>
          <label><input type="radio" name="sex" value="F"> Female</label>
          <label><input type="radio" name="sex" value="?" checked> Unknown</label>
        </div>
      </div>

      <div class="field">
        <label>Color mark?</label>
        <div class="radio-row">
          <label><input type="radio" name="colormark" value="yes"> Yes</label>
          <label><input type="radio" name="colormark" value="no" checked> No</label>
          <label><input type="radio" name="colormark" value="?"> Couldn't tell</label>
        </div>
      </div>

      <div class="field">
        <label>Latitude</label>
        <input type="number" step="any" id="lat" placeholder="38.9575">
      </div>
      <div class="field">
        <label>Longitude</label>
        <input type="number" step="any" id="lng" placeholder="-106.9903">
      </div>
      <div class="field full">
        <button type="button" class="btn btn-ghost" id="useLocation" style="font-size:0.8rem; padding: 0.4rem 0.9rem;">Use my current location</button>
        <span id="locStatus" class="hint" style="margin-left:0.75rem;"></span>
      </div>

      <div class="field full">
        <label>Time of observation</label>
        <input type="datetime-local" id="time">
      </div>

      <div class="field full">
        <label>Photo of the flower <span class="hint">(if it was visiting one)</span></label>
        <label class="file-drop" id="flowerPhotoDrop">
          <span id="flowerPhotoLabel">Click to upload flower photo</span>
          <input type="file" accept="image/*" id="flowerPhoto" hidden>
        </label>
      </div>

      <div class="field full">
        <label>Your name / initials</label>
        <input type="text" id="observer" placeholder="K.">
      </div>

      <div class="field full">
        <label>Notes</label>
        <textarea id="notes" placeholder="Behavior, habitat, anything else worth recording…"></textarea>
      </div>

      <div class="field full">
        <button type="submit" class="btn" id="submitBtn">Submit sighting</button>
        <span id="formStatus" class="hint" style="margin-left:1rem;"></span>
      </div>

    </div>
  </form>
</main>

<footer class="footer">
  Stoddard Lab · Field season 2026
</footer>

<!--
  Assumes js/store.js exports a Supabase client as `window.supabase`,
  initialized with your project URL and anon key.

  Assumed schema for the `sightings` table:
    id            uuid (default gen_random_uuid(), primary key)
    species       text
    sex           text
    colormark     boolean
    lat           double precision
    lng           double precision
    observed_at   timestamptz
    observer      text
    notes         text
    bird_photo    text   (storage path in sighting-photos bucket)
    flower_photo  text   (storage path in sighting-photos bucket)
    created_at    timestamptz default now()

  Assumed storage bucket: `sighting-photos` (public read, anon insert).
-->
<script type="module" src="js/store.js"></script>
<script type="module">
  import { supabase } from './js/store.js';

  // Default time to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('time').value = now.toISOString().slice(0, 16);

  // File input labels
  function wireFile(inputId, labelId, dropId) {
    const input = document.getElementById(inputId);
    const label = document.getElementById(labelId);
    const drop = document.getElementById(dropId);
    input.addEventListener('change', () => {
      if (input.files[0]) {
        label.textContent = '✓ ' + input.files[0].name;
        drop.classList.add('has-file');
      }
    });
  }
  wireFile('birdPhoto', 'birdPhotoLabel', 'birdPhotoDrop');
  wireFile('flowerPhoto', 'flowerPhotoLabel', 'flowerPhotoDrop');

  // Geolocation
  document.getElementById('useLocation').addEventListener('click', () => {
    const status = document.getElementById('locStatus');
    if (!navigator.geolocation) { status.textContent = 'Geolocation not supported.'; return; }
    status.textContent = 'Locating…';
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('lng').value = pos.coords.longitude.toFixed(6);
        status.textContent = '✓ location captured';
      },
      () => { status.textContent = 'Could not get location. Enter manually.'; }
    );
  });

  // Upload a photo to Supabase Storage; return the storage path or null.
  async function uploadPhoto(file, prefix) {
    if (!file) return null;
    const ext = file.name.split('.').pop();
    const path = `${prefix}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
    const { error } = await supabase.storage
      .from('sighting-photos')
      .upload(path, file, { cacheControl: '3600', upsert: false });
    if (error) throw error;
    return path;
  }

  // Submit
  document.getElementById('sightingForm').addEventListener('submit', async e => {
    e.preventDefault();
    const form = e.target;
    const status = document.getElementById('formStatus');
    const submitBtn = document.getElementById('submitBtn');

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    submitBtn.disabled = true;
    status.style.color = '';
    status.textContent = 'Uploading…';

    try {
      const birdFile = document.getElementById('birdPhoto').files[0];
      const flowerFile = document.getElementById('flowerPhoto').files[0];

      const [birdPath, flowerPath] = await Promise.all([
        uploadPhoto(birdFile, 'bird'),
        uploadPhoto(flowerFile, 'flower')
      ]);

      const sighting = {
        species: document.getElementById('species').value,
        sex: document.querySelector('input[name="sex"]:checked')?.value || '?',
        colormark: document.querySelector('input[name="colormark"]:checked')?.value === 'yes',
        lat: parseFloat(document.getElementById('lat').value) || 38.9575,
        lng: parseFloat(document.getElementById('lng').value) || -106.9903,
        observed_at: document.getElementById('time').value
          ? new Date(document.getElementById('time').value).toISOString()
          : new Date().toISOString(),
        observer: document.getElementById('observer').value || 'anon.',
        notes: document.getElementById('notes').value,
        bird_photo: birdPath,
        flower_photo: flowerPath
      };

      const { error } = await supabase.from('sightings').insert(sighting);
      if (error) throw error;

      status.textContent = '✓ Submitted. Redirecting to map…';
      status.style.color = 'var(--forest)';
      setTimeout(() => { window.location.href = 'map.html'; }, 900);
    } catch (err) {
      console.error(err);
      status.textContent = '✗ Submission failed: ' + (err.message || 'unknown error');
      status.style.color = 'crimson';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
